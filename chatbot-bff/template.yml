AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Streaming Lambda + API Gateway REST API

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 60
    MemorySize: 512
    Architectures:
      - x86_64

Resources:
  ChatApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: streaming-chat-api
      StageName: prod
      Cors:
        AllowOrigin: "'*'"
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type,Authorization'"
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          CognitoAuthorizer:
            UserPoolArn: !Sub arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}

  ChatFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: dist/handler.handler
      Environment:
        Variables:
          ALLOWED_ORIGIN: "*"
          INVOKE_AUTH_MODE: !Ref InvokeAuthMode
          AGENT_RUNTIME_ARN: !Ref AgentRuntimeArn
          # TODO: Load from Secrets Manager or SSM Parameter Store instead of hardcoding in env vars
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref CognitoClientId
          COGNITO_USERNAME: !Ref CognitoUsername
          COGNITO_PASSWORD: !Ref CognitoPassword
      Policies:
        - AWSLambdaBasicExecutionRole
      Events:
        ChatPost:
          Type: Api
          Properties:
            RestApiId: !Ref ChatApi
            Path: /chat
            Method: post
            ResponseTransferMode: RESPONSE_STREAM

Parameters:
  AgentRuntimeArn:
    Type: String
    Description: ARN of the Bedrock AgentCore runtime
  InvokeAuthMode:
    Type: String
    Default: jwt
    AllowedValues:
      - jwt
      - sigv4
    Description: Auth mode for invoking the agent (jwt or sigv4)
  CognitoUserPoolId:
    Type: String
    Default: ''
    Description: Cognito User Pool ID (required for jwt mode)
  CognitoClientId:
    Type: String
    Default: ''
    Description: Cognito App Client ID (required for jwt mode)
  CognitoUsername:
    Type: String
    Default: ''
    Description: Cognito username (required for jwt mode)
  CognitoPassword:
    Type: String
    Default: ''
    NoEcho: true
    Description: Cognito password (required for jwt mode)

Outputs:
  ApiUrl:
    Value: !Sub "https://${ChatApi}.execute-api.${AWS::Region}.amazonaws.com/prod/chat"